<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slitherlink Diagram Editor</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f4f5f7;
    color: #1a1a2e;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .toolbar {
    background: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    flex-wrap: wrap;
  }
  .toolbar label {
    font-size: .85em;
    font-weight: 600;
    color: #1a1a6e;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .toolbar input[type="number"] {
    width: 56px;
    padding: 4px 6px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: .85em;
  }
  .toolbar .separator {
    width: 1px;
    height: 24px;
    background: #ddd;
  }
  .toolbar .continue-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toolbar .continue-group span {
    font-size: .85em;
    font-weight: 600;
    color: #1a1a6e;
  }
  .toolbar .continue-group label {
    font-weight: 400;
    font-size: .82em;
    gap: 3px;
    cursor: pointer;
  }
  .toolbar button {
    margin-left: auto;
    padding: 6px 14px;
    background: #1a1a6e;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: .82em;
    font-weight: 600;
    cursor: pointer;
  }
  .toolbar button:hover { background: #2a2a8e; }
  .toolbar button:active { background: #0e0e4e; }

  .panels {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .grid-panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: auto;
    padding: 24px;
  }
  .code-panel {
    width: var(--code-panel-width, 400px);
    min-width: 400px;
    background: white;
    border-left: 1px solid #e0e0e0;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 20px;
    gap: 16px;
  }
  .code-panel h3 {
    font-size: .9em;
    color: #1a1a6e;
    margin: 0;
  }
  .code-block {
    background: #f8f8fa;
    border: 1px solid #e8e8ec;
    border-radius: 8px;
    padding: 14px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: .78em;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    color: #333;
  }
  .preview-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .palette {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 12px 10px;
    background: white;
    border-right: 1px solid #e0e0e0;
    box-shadow: 2px 0 8px rgba(0,0,0,.05);
    overflow-y: auto;
  }
  .palette span.palette-label {
    font-size: .75em;
    font-weight: 600;
    color: #1a1a6e;
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 0 4px 4px;
    border-bottom: 1px solid #eee;
    margin-bottom: 2px;
  }
  .palette button {
    padding: 8px 12px;
    border: 2px solid #ccc;
    border-radius: 6px;
    background: white;
    font-size: .85em;
    font-weight: 600;
    cursor: pointer;
    color: #333;
    margin-left: 0;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .palette button:hover { background: #f0f0f4; }
  .palette button.active { border-color: #1a1a6e; background: #eef; }
  .palette .swatch {
    display: inline-block;
    width: 22px;
    height: 5px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .palette .swatch-cycle { background: linear-gradient(90deg, #000 0%, #daa520 33%, #c0f 66%, #c00 100%); width: 28px; }
  .palette .swatch-undetermined { background: #e0e0e0; }
  .palette .swatch-line { background: #000; }
  .palette .swatch-emphasis { background: #daa520; }
  .palette .swatch-putative { background: repeating-linear-gradient(90deg, #c0f 0 6px, transparent 6px 8px); background-size: 22px 100%; }
  .palette .swatch-xmark { background: transparent; font-size: 14px; font-weight: 700; color: #c00; width: 22px; height: auto; line-height: 1; text-align: center; }
  .palette .swatch-cross { background: #f4f5f7; border: 1px dashed #ccc; width: 16px; height: 14px; border-radius: 2px; margin: 0 3px; }

  .target-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .target-group span {
    font-size: .85em;
    font-weight: 600;
    color: #1a1a6e;
  }
  .target-toggle {
    display: flex;
    border: 1px solid #ccc;
    border-radius: 5px;
    overflow: hidden;
  }
  .target-toggle button {
    padding: 4px 10px;
    border: none;
    background: white;
    font-size: .82em;
    font-weight: 600;
    cursor: pointer;
    color: #555;
    margin-left: 0;
    border-right: 1px solid #ccc;
  }
  .target-toggle button:last-child { border-right: none; }
  .target-toggle button:hover { background: #f0f0f4; }
  .target-toggle button.active { background: #1a1a6e; color: white; }

  .zoom-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .zoom-group span {
    font-size: .85em;
    font-weight: 600;
    color: #1a1a6e;
  }
  .zoom-group input[type="range"] {
    width: 80px;
    cursor: pointer;
  }
  .zoom-group .zoom-val {
    font-size: .78em;
    color: #555;
    min-width: 32px;
  }
</style>
</head>
<body>

<div class="toolbar">
  <label>W <input type="number" id="grid-w" value="3" min="1"></label>
  <label>H <input type="number" id="grid-h" value="3" min="1"></label>
  <div class="separator"></div>
  <div class="continue-group">
    <span>Fade:</span>
    <label><input type="checkbox" id="cont-top" checked> Top</label>
    <label><input type="checkbox" id="cont-bottom" checked> Bottom</label>
    <label><input type="checkbox" id="cont-left" checked> Left</label>
    <label><input type="checkbox" id="cont-right" checked> Right</label>
  </div>
  <div class="separator"></div>
  <div class="target-group">
    <span>Click:</span>
    <div class="target-toggle" id="target-toggle">
      <button data-target="lines">Lines</button>
      <button class="active" data-target="both">Both</button>
      <button data-target="cells">Cells</button>
    </div>
  </div>
  <div class="separator"></div>
  <div class="zoom-group">
    <span>Zoom:</span>
    <input type="range" id="zoom" min="24" max="96" value="48" step="4">
    <span class="zoom-val" id="zoom-val">48</span>
  </div>
  <button id="copy-btn">Copy</button>
</div>

<div class="panels">
  <div class="palette" id="palette">
    <span class="palette-label">Tool</span>
    <button class="active" data-tool="cycle"><span class="swatch swatch-cycle"></span>Cycle</button>
    <button data-tool="undetermined"><span class="swatch swatch-undetermined"></span>Reset</button>
    <button data-tool="line"><span class="swatch swatch-line"></span>Filled</button>
    <button data-tool="emphasis"><span class="swatch swatch-emphasis"></span>Emphasis</button>
    <button data-tool="putative"><span class="swatch swatch-putative"></span>Putative</button>
    <button data-tool="xmark"><span class="swatch swatch-xmark">✕</span>X-mark</button>
    <button data-tool="cross"><span class="swatch swatch-cross"></span>Erase</button>
  </div>
  <div class="grid-panel">
    <svg id="editor-svg"></svg>
  </div>
  <div class="code-panel">
    <h3>Generated Code</h3>
    <pre class="code-block" id="code-output"></pre>
    <h3>Preview</h3>
    <div class="preview-section" id="preview-container"></div>
  </div>
</div>

<script src="sl-diagram.js"></script>
<script>
const ZOOM_MIN = 24, ZOOM_MAX = 96, ZOOM_STEP = 4;
const REF_GRID = 12;

function calcDefaultZoom() {
  const panel = document.querySelector('.grid-panel');
  const availW = panel.clientWidth - 48;
  const availH = panel.clientHeight - 48;
  const avail = Math.min(availW, availH);
  const ideal = avail / (REF_GRID + 2);
  const stepped = Math.floor(ideal / ZOOM_STEP) * ZOOM_STEP;
  return Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, stepped));
}

let CELL = calcDefaultZoom();
document.getElementById('zoom').value = CELL;
document.getElementById('zoom-val').textContent = CELL;

function LINE_W() { return Math.max(2, Math.round(CELL * 0.1)); }
function DOT_R() { return LINE_W(); }
const EDGE_HIT = 12;

let gridW = 3, gridH = 3;
let edgeStates = new Map();
let xmarkSet = new Set();
let clueStates = new Map();

const EDGE_TYPES = ['undetermined', 'line', 'emphasis', 'putative', 'cross'];
let activeTool = 'cycle';
let clickTarget = 'both';

function edgeKey(x1, y1, x2, y2) {
  if (x1 < x2 || (x1 === x2 && y1 < y2)) return `${x1},${y1}|${x2},${y2}`;
  return `${x2},${y2}|${x1},${y1}`;
}

function resetState() {
  edgeStates = new Map();
  xmarkSet = new Set();
  clueStates = new Map();
}

function buildSVG() {
  const svg = document.getElementById('editor-svg');
  const pad = CELL;
  const w = gridW * CELL + pad * 2;
  const h = gridH * CELL + pad * 2;
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.style.cursor = 'default';

  const vx = (gx) => pad + gx * CELL;
  const vy = (gy) => pad + gy * CELL;

  let content = '';

  for (let y = 0; y <= gridH; y++) {
    for (let x = 0; x <= gridW; x++) {
      if (x < gridW) {
        const key = edgeKey(x, y, x + 1, y);
        const state = edgeStates.get(key) || 'undetermined';
        content += renderEdge(key, vx(x), vy(y), vx(x + 1), vy(y), state);
      }
      if (y < gridH) {
        const key = edgeKey(x, y, x, y + 1);
        const state = edgeStates.get(key) || 'undetermined';
        content += renderEdge(key, vx(x), vy(y), vx(x), vy(y + 1), state);
      }
    }
  }

  // Layer: base vertex dots
  for (let y = 0; y <= gridH; y++) {
    for (let x = 0; x <= gridW; x++) {
      content += `<circle cx="${vx(x)}" cy="${vy(y)}" r="${DOT_R()}" fill="#000" style="pointer-events:none;"/>`;
    }
  }

  // Layer: specialized endpoint dots (putative, line, emphasis)
  const vertsByType = { putative: new Set(), line: new Set(), emphasis: new Set() };
  for (const [key, state] of edgeStates) {
    if (vertsByType[state]) {
      const [a, b] = key.split('|');
      vertsByType[state].add(a);
      vertsByType[state].add(b);
    }
  }
  for (const v of vertsByType.putative) {
    const [x, y] = v.split(',').map(Number);
    content += `<circle cx="${vx(x)}" cy="${vy(y)}" r="${DOT_R()}" fill="white" stroke="#c0f" stroke-width="2" style="pointer-events:none;"/>`;
  }
  for (const v of vertsByType.line) {
    const [x, y] = v.split(',').map(Number);
    content += `<circle cx="${vx(x)}" cy="${vy(y)}" r="${DOT_R()}" fill="#000" style="pointer-events:none;"/>`;
  }
  for (const v of vertsByType.emphasis) {
    const [x, y] = v.split(',').map(Number);
    content += `<circle cx="${vx(x)}" cy="${vy(y)}" r="${DOT_R()}" fill="#daa520" style="pointer-events:none;"/>`;
  }

  for (let cy = 1; cy <= gridH; cy++) {
    for (let cx = 1; cx <= gridW; cx++) {
      const px = (vx(cx - 1) + vx(cx)) / 2;
      const py = (vy(cy - 1) + vy(cy)) / 2;
      const clue = clueStates.get(`${cx},${cy}`);
      const clueText = clue !== undefined ? clue : '';
      const fontSize = Math.round(CELL * 0.625);
      const half = fontSize / 2;
      const cellCursor = (clickTarget === 'both' || clickTarget === 'cells') ? 'pointer' : 'default';
      content += `<rect x="${px - half}" y="${py - half}" width="${half * 2}" height="${half * 2}" fill="transparent" style="cursor:${cellCursor};" data-cell="${cx},${cy}" class="cell-target"/>`;
      if (clueText !== '') {
        content += `<text x="${px}" y="${py}" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif" font-size="${fontSize}" font-weight="600" fill="#000" style="pointer-events:none;">${clueText}</text>`;
      }
    }
  }

  // X-mark overlays (on top of everything)
  for (const key of xmarkSet) {
    const [a, b] = key.split('|');
    const [ax, ay] = a.split(',').map(Number);
    const [bx, by] = b.split(',').map(Number);
    const mx = (vx(ax) + vx(bx)) / 2;
    const my = (vy(ay) + vy(by)) / 2;
    const r = CELL * 0.12;
    const xStroke = Math.max(2, Math.round(LINE_W() * 0.6));
    const outlineW = xStroke + 3;
    content += `<line x1="${mx - r}" y1="${my - r}" x2="${mx + r}" y2="${my + r}" stroke="white" stroke-width="${outlineW}" stroke-linecap="round" style="pointer-events:none;"/>`;
    content += `<line x1="${mx - r}" y1="${my + r}" x2="${mx + r}" y2="${my - r}" stroke="white" stroke-width="${outlineW}" stroke-linecap="round" style="pointer-events:none;"/>`;
    content += `<line x1="${mx - r}" y1="${my - r}" x2="${mx + r}" y2="${my + r}" stroke="#c00" stroke-width="${xStroke}" stroke-linecap="round" style="pointer-events:none;"/>`;
    content += `<line x1="${mx - r}" y1="${my + r}" x2="${mx + r}" y2="${my - r}" stroke="#c00" stroke-width="${xStroke}" stroke-linecap="round" style="pointer-events:none;"/>`;
  }

  svg.innerHTML = content;
}

function renderEdge(key, x1, y1, x2, y2, state) {
  let edgeSvg = '';
  const mx = (x1 + x2) / 2;
  const my = (y1 + y2) / 2;
  const isHoriz = y1 === y2;

  if (state === 'undetermined') {
    edgeSvg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#e0e0e0" stroke-width="${LINE_W()}" stroke-linecap="round" style="pointer-events:none;"/>`;
  } else if (state === 'line') {
    edgeSvg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#000" stroke-width="${LINE_W()}" stroke-linecap="round" style="pointer-events:none;"/>`;
  } else if (state === 'emphasis') {
    edgeSvg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#daa520" stroke-width="${LINE_W()}" stroke-linecap="round" style="pointer-events:none;"/>`;
  } else if (state === 'putative') {
    const dash = Math.round(CELL * 0.12);
    const gap = Math.round(CELL * 0.10);
    edgeSvg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#c0f" stroke-width="${LINE_W()}" stroke-linecap="butt" stroke-dasharray="${dash} ${gap}" style="pointer-events:none;"/>`;
  } else if (state === 'cross') {
    // eliminated — no visible line, just the click target below
  }

  const edgeCursor = (clickTarget === 'both' || clickTarget === 'lines') ? 'pointer' : 'default';
  const eHalf = Math.round(CELL * 0.625) / 2;
  if (isHoriz) {
    edgeSvg += `<rect x="${mx - eHalf}" y="${my - EDGE_HIT}" width="${eHalf * 2}" height="${EDGE_HIT * 2}" fill="transparent" style="cursor:${edgeCursor};" data-edge="${key}" class="edge-target"/>`;
  } else {
    edgeSvg += `<rect x="${mx - EDGE_HIT}" y="${my - eHalf}" width="${EDGE_HIT * 2}" height="${eHalf * 2}" fill="transparent" style="cursor:${edgeCursor};" data-edge="${key}" class="edge-target"/>`;
  }

  return edgeSvg;
}

buildSVG();

document.getElementById('palette').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-tool]');
  if (!btn) return;
  activeTool = btn.dataset.tool;
  document.querySelectorAll('#palette button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
});

document.getElementById('target-toggle').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-target]');
  if (!btn) return;
  clickTarget = btn.dataset.target;
  document.querySelectorAll('#target-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildSVG();
});

document.getElementById('editor-svg').addEventListener('click', (e) => {
  const edgeEl = e.target.closest('.edge-target');
  if (edgeEl && (clickTarget === 'both' || clickTarget === 'lines')) {
    const key = edgeEl.dataset.edge;
    if (activeTool === 'xmark') {
      if (xmarkSet.has(key)) xmarkSet.delete(key);
      else xmarkSet.add(key);
    } else if (activeTool === 'cycle') {
      const current = edgeStates.get(key) || 'undetermined';
      const idx = EDGE_TYPES.indexOf(current);
      const next = EDGE_TYPES[(idx + 1) % EDGE_TYPES.length];
      if (next === 'undetermined') {
        edgeStates.delete(key);
      } else {
        edgeStates.set(key, next);
      }
    } else if (activeTool === 'undetermined') {
      edgeStates.delete(key);
      xmarkSet.delete(key);
    } else {
      edgeStates.set(key, activeTool);
    }
    buildSVG();
    updateOutput();
    return;
  }

  const cellEl = e.target.closest('.cell-target');
  if (cellEl && (clickTarget === 'both' || clickTarget === 'cells')) {
    const key = cellEl.dataset.cell;
    const current = clueStates.get(key);
    if (current === undefined) {
      clueStates.set(key, 0);
    } else if (current >= 3) {
      clueStates.delete(key);
    } else {
      clueStates.set(key, current + 1);
    }
    buildSVG();
    updateOutput();
  }
});

function directionLetter(x1, y1, x2, y2) {
  if (x2 === x1 + 1) return 'R';
  if (x2 === x1 - 1) return 'L';
  if (y2 === y1 + 1) return 'D';
  if (y2 === y1 - 1) return 'U';
  return null;
}

function chainEdges(edgeKeys) {
  if (edgeKeys.length === 0) return '';

  const adj = new Map();
  const addAdj = (vKey, nKey, ek) => {
    if (!adj.has(vKey)) adj.set(vKey, []);
    adj.get(vKey).push({ neighbor: nKey, edgeKey: ek });
  };
  const remaining = new Set(edgeKeys);

  for (const ek of edgeKeys) {
    const [a, b] = ek.split('|');
    addAdj(a, b, ek);
    addAdj(b, a, ek);
  }

  const segments = [];

  while (remaining.size > 0) {
    let startVertex = null;
    for (const ek of remaining) {
      const [a, b] = ek.split('|');
      const degA = (adj.get(a) || []).filter(e => remaining.has(e.edgeKey)).length;
      const degB = (adj.get(b) || []).filter(e => remaining.has(e.edgeKey)).length;
      if (degA === 1) { startVertex = a; break; }
      if (degB === 1) { startVertex = b; break; }
    }
    if (!startVertex) {
      const firstEdge = remaining.values().next().value;
      startVertex = firstEdge.split('|')[0];
    }

    let current = startVertex;
    let dirs = '';
    let moved = true;
    while (moved) {
      moved = false;
      const neighbors = adj.get(current) || [];
      for (const { neighbor, edgeKey: ek } of neighbors) {
        if (remaining.has(ek)) {
          const [cx, cy] = current.split(',').map(Number);
          const [nx, ny] = neighbor.split(',').map(Number);
          dirs += directionLetter(cx, cy, nx, ny);
          remaining.delete(ek);
          current = neighbor;
          moved = true;
          break;
        }
      }
    }
    const [sx, sy] = startVertex.split(',');
    segments.push(`${sx},${sy}->${dirs}`);
  }

  return segments.join('; ');
}

function generateCode() {
  const parts = [];
  parts.push(`size="${gridW}x${gridH}"`);

  const clueTokens = [];
  for (let cy = 1; cy <= gridH; cy++) {
    for (let cx = 1; cx <= gridW; cx++) {
      const v = clueStates.get(`${cx},${cy}`);
      if (v !== undefined) clueTokens.push(`${cx},${cy}:${v}`);
    }
  }
  if (clueTokens.length > 0) parts.push(`clues="${clueTokens.join(' ')}"`);

  const byType = { line: [], emphasis: [], putative: [], cross: [] };
  for (const [key, type] of edgeStates) {
    byType[type].push(key);
  }

  const attrName = { line: 'lines', emphasis: 'emphasis', putative: 'putative', cross: 'erased' };
  for (const type of ['line', 'emphasis', 'putative', 'cross']) {
    if (byType[type].length > 0) {
      const chained = chainEdges(byType[type]);
      parts.push(`${attrName[type]}="${chained}"`);
    }
  }
  if (xmarkSet.size > 0) {
    const chained = chainEdges([...xmarkSet]);
    parts.push(`x-marks="${chained}"`);
  }

  const sides = [];
  if (document.getElementById('cont-top').checked) sides.push('top');
  if (document.getElementById('cont-bottom').checked) sides.push('bottom');
  if (document.getElementById('cont-left').checked) sides.push('left');
  if (document.getElementById('cont-right').checked) sides.push('right');
  const contValue = sides.length === 4 ? 'all' : sides.length === 0 ? 'none' : sides.join(' ');
  parts.push(`continue="${contValue}"`);

  return `<sl-diagram\n  ${parts.join('\n  ')}\n></sl-diagram>`;
}

function updateOutput() {
  const code = generateCode();
  document.getElementById('code-output').textContent = code;

  const container = document.getElementById('preview-container');
  container.innerHTML = code;

  // Resize code panel to fit preview diagram
  requestAnimationFrame(() => {
    const diagram = container.querySelector('sl-diagram');
    if (diagram && diagram.shadowRoot) {
      const svg = diagram.shadowRoot.querySelector('svg');
      if (svg) {
        const needed = svg.getAttribute('width');
        const w = Math.max(400, Math.min(800, (parseFloat(needed) || 0) + 60));
        document.querySelector('.code-panel').style.setProperty('--code-panel-width', w + 'px');
      }
    }
  });
}

updateOutput();

document.getElementById('editor-svg').addEventListener('contextmenu', (e) => {
  e.preventDefault();
  const edgeEl = e.target.closest('.edge-target');
  if (edgeEl && activeTool !== 'cycle' && (clickTarget === 'both' || clickTarget === 'lines')) {
    const key = edgeEl.dataset.edge;
    edgeStates.delete(key);
    buildSVG();
    updateOutput();
    return;
  }

  const cellEl = e.target.closest('.cell-target');
  if (cellEl && (clickTarget === 'both' || clickTarget === 'cells')) {
    e.preventDefault();
    const key = cellEl.dataset.cell;
    const current = clueStates.get(key);
    if (current === undefined) {
      clueStates.set(key, 3);
    } else if (current <= 0) {
      clueStates.delete(key);
    } else {
      clueStates.set(key, current - 1);
    }
    buildSVG();
    updateOutput();
  }
});

document.getElementById('editor-svg').addEventListener('mouseover', (e) => {
  if (e.target.classList.contains('edge-target') && (clickTarget === 'both' || clickTarget === 'lines')) {
    e.target.style.fill = 'rgba(100, 150, 255, 0.12)';
  }
  if (e.target.classList.contains('cell-target') && (clickTarget === 'both' || clickTarget === 'cells')) {
    e.target.style.fill = 'rgba(100, 150, 255, 0.12)';
  }
});
document.getElementById('editor-svg').addEventListener('mouseout', (e) => {
  if (e.target.classList.contains('edge-target') || e.target.classList.contains('cell-target')) {
    e.target.style.fill = 'transparent';
  }
});

document.getElementById('grid-w').addEventListener('change', (e) => {
  const v = parseInt(e.target.value, 10);
  if (v >= 1) {
    gridW = v;
    resetState();
    buildSVG();
    updateOutput();
  }
});
document.getElementById('grid-h').addEventListener('change', (e) => {
  const v = parseInt(e.target.value, 10);
  if (v >= 1) {
    gridH = v;
    resetState();
    buildSVG();
    updateOutput();
  }
});

for (const id of ['cont-top', 'cont-bottom', 'cont-left', 'cont-right']) {
  document.getElementById(id).addEventListener('change', () => updateOutput());
}

document.getElementById('zoom').addEventListener('input', (e) => {
  CELL = parseInt(e.target.value, 10);
  document.getElementById('zoom-val').textContent = CELL;
  buildSVG();
});

document.getElementById('copy-btn').addEventListener('click', () => {
  const code = document.getElementById('code-output').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
});

const KEY_TO_TOOL = { c: 'cycle', r: 'undetermined', f: 'line', m: 'emphasis', p: 'putative', x: 'xmark', e: 'cross' };
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === '`') {
    const modes = ['lines', 'both', 'cells'];
    clickTarget = modes[(modes.indexOf(clickTarget) + 1) % modes.length];
    document.querySelectorAll('#target-toggle button').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`#target-toggle [data-target="${clickTarget}"]`);
    if (btn) btn.classList.add('active');
    buildSVG();
    return;
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    const tools = [...document.querySelectorAll('#palette [data-tool]')].map(b => b.dataset.tool);
    const idx = tools.indexOf(activeTool);
    activeTool = tools[(idx + (e.shiftKey ? tools.length - 1 : 1)) % tools.length];
    document.querySelectorAll('#palette button').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`#palette [data-tool="${activeTool}"]`);
    if (btn) btn.classList.add('active');
    return;
  }
  const tool = KEY_TO_TOOL[e.key.toLowerCase()];
  if (tool) {
    activeTool = tool;
    document.querySelectorAll('#palette button').forEach(b => b.classList.remove('active'));
    const btn = document.querySelector(`#palette [data-tool="${tool}"]`);
    if (btn) btn.classList.add('active');
  }
});
</script>
</body>
</html>
