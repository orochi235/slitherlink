<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slitherlink Diagram Editor</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f4f5f7;
    color: #1a1a2e;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .toolbar {
    background: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    flex-wrap: wrap;
  }
  .toolbar label {
    font-size: .85em;
    font-weight: 600;
    color: #1a1a6e;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .toolbar input[type="number"] {
    width: 56px;
    padding: 4px 6px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: .85em;
  }
  .toolbar .separator {
    width: 1px;
    height: 24px;
    background: #ddd;
  }
  .toolbar .continue-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toolbar .continue-group span {
    font-size: .85em;
    font-weight: 600;
    color: #1a1a6e;
  }
  .toolbar .continue-group label {
    font-weight: 400;
    font-size: .82em;
    gap: 3px;
    cursor: pointer;
  }
  .toolbar button {
    margin-left: auto;
    padding: 6px 14px;
    background: #1a1a6e;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: .82em;
    font-weight: 600;
    cursor: pointer;
  }
  .toolbar button:hover { background: #2a2a8e; }
  .toolbar button:active { background: #0e0e4e; }

  .panels {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .grid-panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: auto;
    padding: 24px;
  }
  .code-panel {
    width: 400px;
    min-width: 300px;
    background: white;
    border-left: 1px solid #e0e0e0;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 20px;
    gap: 16px;
  }
  .code-panel h3 {
    font-size: .9em;
    color: #1a1a6e;
    margin: 0;
  }
  .code-block {
    background: #f8f8fa;
    border: 1px solid #e8e8ec;
    border-radius: 8px;
    padding: 14px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: .78em;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    color: #333;
  }
  .preview-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
</style>
</head>
<body>

<div class="toolbar">
  <label>W <input type="number" id="grid-w" value="3" min="1"></label>
  <label>H <input type="number" id="grid-h" value="3" min="1"></label>
  <div class="separator"></div>
  <div class="continue-group">
    <span>Fade:</span>
    <label><input type="checkbox" id="cont-top" checked> Top</label>
    <label><input type="checkbox" id="cont-bottom" checked> Bottom</label>
    <label><input type="checkbox" id="cont-left" checked> Left</label>
    <label><input type="checkbox" id="cont-right" checked> Right</label>
  </div>
  <button id="copy-btn">Copy</button>
</div>

<div class="panels">
  <div class="grid-panel">
    <svg id="editor-svg"></svg>
  </div>
  <div class="code-panel">
    <h3>Generated Code</h3>
    <pre class="code-block" id="code-output"></pre>
    <h3>Preview</h3>
    <div class="preview-section" id="preview-container"></div>
  </div>
</div>

<script src="sl-diagram.js"></script>
<script>
</script>
</body>
</html>
